version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - noctx
    - errorlint
    - nilerr
    - nilnil
    - exhaustive
    - gocheckcompilerdirectives
    - durationcheck
    - contextcheck

    # Security
    - gosec

    # Code quality / modernization
    - gocritic
    - copyloopvar
    - intrange
    - unconvert
    - unparam
    - wastedassign
    - makezero
    - prealloc
    - misspell

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G115
    misspell:
      ignore-rules:
        # Portuguese words flagged by the default English dictionary.
        # Comments in the codebase use pt-BR; these are all valid words.
        - comando
        - comandos
        - correspondente
        - duplicatas
        - clientes
        - momento
        - eles
        - editores
        - transforme
        - conversão
        - conversões
        - convers
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Handlers use validateReq / parseAndValidate which already writes the
      # HTTP response and returns a sentinel; the handler then returns nil.
      # nilerr does not see through this pattern.
      - path: internal/handler/
        linters:
          - nilerr
      - path: internal/integrations/.*/handler\.go
        linters:
          - nilerr
      # processInboundEvent caches missing config and returns nil — intentional
      # no-op when integration is not configured for the session.
      - path: internal/integrations/.*/service\.go
        linters:
          - nilerr
      # Integration services/consumers pass Fiber or NATS contexts to
      # background goroutines with their own timeout — contextcheck flags
      # the parent ctx reuse as a false positive.
      - path: (internal/integrations/|internal/service/message\.go|internal/service/status\.go|internal/service/history\.go|internal/wa/connect\.go|internal/webhook/dispatcher\.go)
        linters:
          - contextcheck
      # Test helpers return (nil, nil) for stub implementations and use
      # fixed parameter values; both are intentional.
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - gosec
          - nilnil
          - unparam
      # ifElseChain in webhook builders: the if/else reads more clearly than
      # a switch when checking pointer + value conditions.
      - path: internal/integrations/.*/webhook_outbound\.go
        linters:
          - gocritic
      # Client methods accept a method parameter for future HTTP verbs even
      # though today only POST is used.
      - path: internal/integrations/.*/client\.go
        linters:
          - unparam
      # Event processor signatures include ctx for interface consistency
      # even when the current implementation doesn't use it.
      - path: internal/integrations/.*/events\.go
        linters:
          - unparam
      # Test makePayload helpers use fixed values for convenience.
      - path: internal/integrations/.*_test\.go
        linters:
          - unparam

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

