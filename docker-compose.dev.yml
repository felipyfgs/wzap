# =============================================================================
# wzap — Overlay de desenvolvimento (api + web com hot reload)
# =============================================================================
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#   (ou `make docker-dev`)
# =============================================================================

services:
  api:
    image: wzap-api:dev
    build:
      context: .
      target: api-dev
    container_name: wzap_api
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wzap}:${POSTGRES_PASSWORD:-wzap123}@postgres:5432/${POSTGRES_DB:-wzap}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      NATS_URL: nats://nats:4222
      SERVER_URL: ${SERVER_URL:-http://api:8080}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - .:/app
      - api_go_mod:/go/pkg/mod
      - api_go_build:/root/.cache/go-build
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
      nats:     { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    restart: unless-stopped
    networks:
      wzap_net: {}
      # Alias `wzap_app` p/ backward-compat com Chatwoot (que tem o hostname antigo
      # salvo na config do Cloud Inbox). Assim, tanto `api:8080` quanto
      # `wzap_app:8080` resolvem para este container.
      wzap_chatwoot:
        aliases: [api, wzap_app]

  web:
    image: wzap-web:dev
    build:
      context: .
      target: web-dev
    container_name: wzap_web
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      # URLs internas do Docker — NÃO ler do .env (que é p/ dev local sem docker)
      NUXT_API_URL: http://api:8080
      NUXT_MINIO_ENDPOINT: http://minio:9000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-}
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ./web:/web
      - web_node_modules:/web/node_modules
      - web_nuxt_cache:/web/.nuxt
    depends_on:
      api: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    restart: unless-stopped
    networks: [wzap_net]

volumes:
  api_go_mod:
  api_go_build:
  web_node_modules:
  web_nuxt_cache:
