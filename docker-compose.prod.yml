# =============================================================================
# wzap — Overlay de produção (api + web como serviços separados)
# =============================================================================
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   (ou `make docker-prod`)
#
# Para um deploy single-image (API + Web numa só imagem), use
# `./scripts/setup.sh` (target=combined) e a imagem `wzap:latest`.
# =============================================================================

services:
  api:
    image: wzap-api:latest
    build:
      context: .
      target: api-prod
    container_name: wzap_api
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wzap}:${POSTGRES_PASSWORD:-wzap123}@postgres:5432/${POSTGRES_DB:-wzap}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      NATS_URL: nats://nats:4222
      SERVER_URL: ${SERVER_URL:-http://api:8080}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
      nats:     { condition: service_healthy }
    restart: unless-stopped
    networks:
      wzap_net: {}
      # Alias `wzap_app` p/ backward-compat com Chatwoot (que tem o hostname antigo
      # salvo na config do Cloud Inbox). Assim, tanto `api:8080` quanto
      # `wzap_app:8080` resolvem para este container.
      wzap_chatwoot:
        aliases: [api, wzap_app]

  web:
    image: wzap-web:latest
    build:
      context: .
      target: web-prod
    container_name: wzap_web
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      # URLs internas do Docker — NÃO ler do .env (que é p/ dev local sem docker)
      NUXT_API_URL: http://api:8080
      NUXT_MINIO_ENDPOINT: http://minio:9000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      api: { condition: service_started }
    restart: unless-stopped
    networks: [wzap_net]
