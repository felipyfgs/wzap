services:
  wzap:
    image: wzap:dev
    build:
      context: .
      target: dev
    container_name: wzap_app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wzap}:${POSTGRES_PASSWORD:-wzap123}@wzap_postgres:5432/${POSTGRES_DB:-wzap}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      NATS_URL: nats://nats:4222
      SERVER_URL: ${SERVER_URL:-http://wzap_app:8080}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - default
      - wzap_chatwoot
    restart: unless-stopped

  web:
    image: wzap-web:dev
    build:
      context: ./web
      dockerfile: Dockerfile
      target: web-dev
    container_name: wzap_web
    environment:
      NUXT_DEVTOOLS_ENABLED: "false"
      NUXT_API_URL: http://wzap:8080
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_nuxt_cache:/app/.nuxt
    ports:
      - "${WEB_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: wzap_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wzap}
      POSTGRES_USER: ${POSTGRES_USER:-wzap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wzap123}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wzap} -d ${POSTGRES_DB:-wzap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    container_name: wzap_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-admin123}
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: wzap_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  go_mod_cache:
  go_build_cache:
  web_node_modules:
  web_nuxt_cache:

networks:
  wzap_chatwoot:
    external: true
    name: wzap_chatwoot
