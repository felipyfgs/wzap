# =============================================================================
# wzap — Infraestrutura base (Postgres, MinIO, NATS)
# =============================================================================
# Os serviços da aplicação (api, web) ficam nos arquivos de overlay:
#   docker-compose.dev.yml   → modo dev (hot reload)
#   docker-compose.prod.yml  → modo produção
#
# A rede `wzap_chatwoot` é `external: true` em ambos os stacks (wzap e chatwoot)
# para permitir comunicação cross-stack. Ela é criada idempotentemente pelo
# Makefile antes do `docker compose up` (target `docker-network-init`), ou
# manualmente com `docker network create wzap_chatwoot`.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: wzap_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wzap}
      POSTGRES_USER: ${POSTGRES_USER:-wzap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wzap123}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wzap} -d ${POSTGRES_DB:-wzap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [wzap_net]

  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    container_name: wzap_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-admin123}
    ports:
      - "${MINIO_BIND_ADDR:-127.0.0.1}:${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_BIND_ADDR:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [wzap_net]

  nats:
    image: nats:2-alpine
    container_name: wzap_nats
    ports:
      - "${NATS_BIND_ADDR:-127.0.0.1}:${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_BIND_ADDR:-127.0.0.1}:${NATS_MONITOR_PORT:-8222}:8222"
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [wzap_net]

volumes:
  postgres_data:
  minio_data:

networks:
  wzap_net:
    name: wzap_net
    driver: bridge
  wzap_chatwoot:
    external: true
    name: wzap_chatwoot
