# =============================================================================
# Chatwoot — stack completo (rails + sidekiq + postgres + redis)
# =============================================================================
# Usa a rede `wzap_chatwoot` criada pelo compose principal do wzap para que o
# serviço `api` do wzap seja alcançável em http://api:8080 a partir do rails.
# Suba o wzap antes: `make docker-dev` ou `make docker-prod`.
# =============================================================================

x-base: &base
  image: chatwoot/chatwoot:latest
  env_file: .env
  volumes:
    - storage_data:/app/storage
    - ./trigger.rb:/app/lib/webhooks/trigger.rb:ro
    - ./wzap_patches.rb:/app/config/initializers/wzap_patches.rb:ro
  restart: unless-stopped

x-rails-env: &rails-env
  NODE_ENV: production
  RAILS_ENV: production
  INSTALLATION_ENV: docker
  WHATSAPP_CLOUD_BASE_URL: ${WHATSAPP_CLOUD_BASE_URL:-http://api:8080}
  # Desativa janela de 24h em inboxes WhatsApp Cloud (usadas pelo wzap).
  # Ver docker/chatwoot/wzap_patches.rb para detalhes.
  WZAP_BYPASS_24H_WINDOW: ${WZAP_BYPASS_24H_WINDOW:-true}

services:
  rails:
    <<: *base
    container_name: chatwoot_rails
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${CHATWOOT_PORT:-3000}:3000"
    environment:
      <<: *rails-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: docker/entrypoints/rails.sh
    command: ['sh', '-c', 'bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0']
    networks: [default, wzap_chatwoot]

  sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      <<: *rails-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks: [default, wzap_chatwoot]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatwoot_postgres_pass}
    ports:
      - "${CHATWOOT_POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-chatwoot_redis_pass}
    ports:
      - "${CHATWOOT_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  storage_data:
  postgres_data:
  redis_data:

networks:
  wzap_chatwoot:
    external: true
    name: wzap_chatwoot
