definitions:
  wzap_internal_model.APIError:
    properties:
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  wzap_internal_model.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  wzap_internal_model.CheckContactReq:
    properties:
      phones:
        items:
          type: string
        type: array
    required:
    - phones
    type: object
  wzap_internal_model.CreateGroupReq:
    properties:
      name:
        example: My Awesome Group
        type: string
      participants:
        description: list of phone numbers
        example:
        - "5511999999999"
        - "5511888888888"
        items:
          type: string
        type: array
    type: object
  wzap_internal_model.CreateWebhookReq:
    properties:
      events:
        items:
          type: string
        type: array
      secret:
        type: string
      url:
        type: string
    required:
    - events
    - url
    type: object
  wzap_internal_model.GroupInviteLinkResp:
    properties:
      link:
        type: string
    type: object
  wzap_internal_model.GroupJIDReq:
    properties:
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  wzap_internal_model.GroupJoinReq:
    properties:
      invite_code:
        type: string
    required:
    - invite_code
    type: object
  wzap_internal_model.GroupParticipantReq:
    properties:
      action:
        description: add, remove, promote, demote
        example: add
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  wzap_internal_model.GroupPhotoReq:
    properties:
      groupJid:
        type: string
      photo_base64:
        description: Base64 encoded image
        type: string
    required:
    - groupJid
    - photo_base64
    type: object
  wzap_internal_model.GroupRequestActionReq:
    properties:
      action:
        description: approve, reject
        example: approve
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  wzap_internal_model.GroupSettingReq:
    properties:
      enabled:
        type: boolean
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  wzap_internal_model.GroupTextReq:
    properties:
      groupJid:
        type: string
      text:
        type: string
    required:
    - groupJid
    - text
    type: object
  wzap_internal_model.SendMediaReq:
    properties:
      base64:
        description: For base64 upload
        type: string
      caption:
        type: string
      filename:
        description: For documents
        type: string
      mime_type:
        type: string
      to:
        type: string
    required:
    - mime_type
    - to
    type: object
  wzap_internal_model.SendTextReq:
    properties:
      text:
        type: string
      to:
        description: Phone number or group JID
        type: string
    required:
    - text
    - to
    type: object
  wzap_internal_model.SessionCreateReq:
    properties:
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
    required:
    - id
    type: object
info:
  contact:
    name: wzap Support
    url: https://github.com/galvaofelipe421-wq/fiozap
  description: WhatsApp Multi-Session API powered by whatsmeow
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/galvaofelipe421-wq/fiozap
  title: wzap API
  version: "1.0"
paths:
  /contacts:
    get:
      description: Returns all contacts from the WhatsApp session
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: List contacts
      tags:
      - Contacts
  /contacts/check:
    post:
      consumes:
      - application/json
      description: Checks if phone numbers are registered on WhatsApp
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Phone numbers
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.CheckContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Check contacts on WhatsApp
      tags:
      - Contacts
  /groups:
    get:
      description: Returns all WhatsApp groups the session is part of
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: List joined groups
      tags:
      - Groups
  /groups/announce:
    post:
      consumes:
      - application/json
      description: Sets whether only admins can send messages in the group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group announce mode
      tags:
      - Groups
  /groups/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp group with the given participants
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Group properties
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.CreateGroupReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new group
      tags:
      - Groups
  /groups/description:
    post:
      consumes:
      - application/json
      description: Updates the description of the specified WhatsApp group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: New description
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group description
      tags:
      - Groups
  /groups/info:
    get:
      description: Get detailed information about a group by JID
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Group JID
        in: query
        name: jid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get group info
      tags:
      - Groups
  /groups/invite-info:
    get:
      description: Previews a group's info using an invite code without joining
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Invite Code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get group info from invite link
      tags:
      - Groups
  /groups/invite-link:
    post:
      description: Gets the invite link for a WhatsApp group, optionally resetting
        it
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupJIDReq'
      - description: Reset the invite link
        in: query
        name: reset
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/wzap_internal_model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/wzap_internal_model.GroupInviteLinkResp'
              type: object
      security:
      - BearerAuth: []
      summary: Get group invite link
      tags:
      - Groups
  /groups/join:
    post:
      consumes:
      - application/json
      description: Joins a group using an invite code
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Invite Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupJoinReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Join group via link
      tags:
      - Groups
  /groups/join-approval:
    post:
      consumes:
      - application/json
      description: Activates or deactivates the admin approval system for new members
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group join approval mode
      tags:
      - Groups
  /groups/leave:
    post:
      description: Leaves a specified WhatsApp group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupJIDReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Leave group
      tags:
      - Groups
  /groups/locked:
    post:
      consumes:
      - application/json
      description: Sets whether only admins can edit group info
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group locked mode
      tags:
      - Groups
  /groups/name:
    post:
      consumes:
      - application/json
      description: Updates the name of the specified WhatsApp group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: New name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group name
      tags:
      - Groups
  /groups/participants:
    post:
      consumes:
      - application/json
      description: Add, remove, promote or demote participants in a group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Participants and action
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group participants
      tags:
      - Groups
  /groups/photo:
    post:
      consumes:
      - application/json
      description: Updates the profile picture of the specified WhatsApp group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Base64 encoded photo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupPhotoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group photo
      tags:
      - Groups
  /groups/requests:
    post:
      description: Get the list of participants that requested to join the group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupJIDReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get group join requests
      tags:
      - Groups
  /groups/requests/action:
    post:
      consumes:
      - application/json
      description: Approves or rejects participants that requested to join the group
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Participants and action (approve/reject)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.GroupRequestActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Approve/Reject group join requests
      tags:
      - Groups
  /health:
    get:
      description: Returns the health status of the API and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      summary: Health check
      tags:
      - Health
  /messages/audio:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Media payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SendMediaReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Send an audio message
      tags:
      - Messages
  /messages/document:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Media payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SendMediaReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Send a document
      tags:
      - Messages
  /messages/image:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Media payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SendMediaReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Send an image message
      tags:
      - Messages
  /messages/text:
    post:
      consumes:
      - application/json
      description: Sends a text message via WhatsApp. If :id is omitted, session is
        identified from Bearer token.
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Message payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SendTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Send a text message
      tags:
      - Messages
  /messages/video:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      - description: Media payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SendMediaReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Send a video message
      tags:
      - Messages
  /session:
    delete:
      description: Disconnects and deletes the current session
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete current session
      tags:
      - Sessions
    get:
      description: Returns the session identified by the Bearer token (or query/header
        fallback)
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get current session
      tags:
      - Sessions
  /session/connect:
    post:
      description: Connects a WhatsApp session (starts pairing if new)
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Connect current session
      tags:
      - Sessions
  /session/disconnect:
    post:
      description: Disconnects the active WhatsApp session
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Disconnect current session
      tags:
      - Sessions
  /session/qr:
    get:
      description: Returns a QR code for pairing a new WhatsApp device for current
        session
      parameters:
      - description: Session ID (Admin fallback)
        in: header
        name: X-Session-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get QR code for pair
      tags:
      - Sessions
  /sessions:
    get:
      description: Returns all sessions (Admin) or just the authenticated session
        (User)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: List sessions
      tags:
      - Sessions
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp session entry in the database. Returns the
        generated api_key.
      parameters:
      - description: Session data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.SessionCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/wzap_internal_model.APIError'
      security:
      - BearerAuth: []
      summary: Create a new session (Admin Only)
      tags:
      - Sessions
  /sessions/{id}/webhooks:
    get:
      description: Returns all webhooks for a session
      parameters:
      - description: Session ID
        in: path
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: List webhooks
      tags:
      - Webhooks
    post:
      consumes:
      - application/json
      description: Registers a new webhook for a session
      parameters:
      - description: Session ID
        in: path
        name: id
        type: string
      - description: Webhook data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/wzap_internal_model.CreateWebhookReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wzap_internal_model.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a webhook
      tags:
      - Webhooks
  /sessions/{id}/webhooks/{wid}:
    delete:
      description: Removes a webhook from a session
      parameters:
      - description: Session ID
        in: path
        name: id
        type: string
      - description: Webhook ID
        in: path
        name: wid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
