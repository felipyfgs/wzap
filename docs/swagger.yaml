definitions:
  APIError:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  BlockContactReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  ButtonItem:
    properties:
      id:
        type: string
      text:
        type: string
    required:
    - id
    - text
    type: object
  ChatActionReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  ChatMarkReadReq:
    properties:
      jid:
        type: string
      messageIds:
        items:
          type: string
        type: array
    required:
    - jid
    - messageIds
    type: object
  CheckContactReq:
    properties:
      phones:
        items:
          type: string
        type: array
    required:
    - phones
    type: object
  CommunityParticipantReq:
    properties:
      communityJid:
        type: string
      participants:
        items:
          type: string
        type: array
    required:
    - communityJid
    - participants
    type: object
  ConnectResp:
    properties:
      status:
        type: string
    type: object
  CreateCommunityReq:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  CreateGroupReq:
    properties:
      name:
        example: My Awesome Group
        type: string
      participants:
        example:
        - "5511999999999"
        - "5511888888888"
        items:
          type: string
        type: array
    type: object
  CreateNewsletterReq:
    properties:
      description:
        type: string
      name:
        type: string
      picture:
        type: string
    required:
    - name
    type: object
  CreateWebhookReq:
    properties:
      events:
        items:
          type: string
        type: array
      natsEnabled:
        type: boolean
      secret:
        type: string
      url:
        type: string
    required:
    - events
    - url
    type: object
  DeleteMessageReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
    required:
    - messageId
    - phone
    type: object
  EditLabelReq:
    properties:
      color:
        type: integer
      deleted:
        type: boolean
      labelId:
        type: string
      name:
        type: string
    required:
    - labelId
    type: object
  EditMessageReq:
    properties:
      body:
        type: string
      messageId:
        type: string
      phone:
        type: string
    required:
    - body
    - messageId
    - phone
    type: object
  GetAvatarReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  GetAvatarResp:
    properties:
      id:
        type: string
      url:
        type: string
    type: object
  GetUserInfoReq:
    properties:
      phones:
        items:
          type: string
        type: array
    required:
    - phones
    type: object
  GroupEphemeralReq:
    properties:
      duration:
        type: integer
      groupJid:
        type: string
    required:
    - duration
    - groupJid
    type: object
  GroupInviteLinkResp:
    properties:
      link:
        type: string
    type: object
  GroupJIDReq:
    properties:
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  GroupJoinReq:
    properties:
      inviteCode:
        type: string
    required:
    - inviteCode
    type: object
  GroupParticipantReq:
    properties:
      action:
        example: add
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  GroupPhotoReq:
    properties:
      groupJid:
        type: string
      image:
        type: string
    required:
    - groupJid
    - image
    type: object
  GroupRequestActionReq:
    properties:
      action:
        example: approve
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  GroupSettingReq:
    properties:
      enabled:
        type: boolean
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  GroupTextReq:
    properties:
      groupJid:
        type: string
      text:
        type: string
    required:
    - groupJid
    - text
    type: object
  LabelChatReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
    required:
    - jid
    - labelId
    type: object
  LabelMessageReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
      messageId:
        type: string
    required:
    - jid
    - labelId
    - messageId
    type: object
  ListRow:
    properties:
      description:
        type: string
      id:
        type: string
      title:
        type: string
    required:
    - id
    - title
    type: object
  ListSection:
    properties:
      rows:
        items:
          $ref: '#/definitions/ListRow'
        minItems: 1
        type: array
      title:
        type: string
    required:
    - rows
    type: object
  MarkReadReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
    required:
    - messageId
    - phone
    type: object
  MidResp:
    properties:
      messageId:
        type: string
    type: object
  NewsletterMarkViewedReq:
    properties:
      newsletterJid:
        type: string
      serverIds:
        items:
          type: integer
        type: array
    required:
    - newsletterJid
    - serverIds
    type: object
  NewsletterMessageReq:
    properties:
      beforeId:
        type: integer
      count:
        type: integer
      newsletterJid:
        type: string
    required:
    - newsletterJid
    type: object
  NewsletterMuteReq:
    properties:
      mute:
        type: boolean
      newsletterJid:
        type: string
    required:
    - newsletterJid
    type: object
  NewsletterReactReq:
    properties:
      messageId:
        type: string
      newsletterJid:
        type: string
      reaction:
        type: string
      serverId:
        type: integer
    required:
    - messageId
    - newsletterJid
    - reaction
    - serverId
    type: object
  NewsletterSubscribeReq:
    properties:
      newsletterJid:
        type: string
    required:
    - newsletterJid
    type: object
  PairPhoneReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  PairPhoneResp:
    properties:
      pairingCode:
        type: string
    type: object
  PictureIDResp:
    properties:
      pictureId:
        type: string
    type: object
  QRResp:
    properties:
      image:
        type: string
      qrCode:
        type: string
    type: object
  ReactMessageReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
      reaction:
        type: string
    required:
    - messageId
    - phone
    - reaction
    type: object
  ReplyContext:
    properties:
      mentionedJid:
        items:
          type: string
        type: array
      messageId:
        type: string
      participant:
        type: string
    type: object
  SendButtonReq:
    properties:
      body:
        type: string
      buttons:
        items:
          $ref: '#/definitions/ButtonItem'
        minItems: 1
        type: array
      customId:
        type: string
      footer:
        type: string
      phone:
        type: string
      replyTo:
        $ref: '#/definitions/ReplyContext'
    required:
    - body
    - buttons
    - phone
    type: object
  SendContactReq:
    properties:
      name:
        type: string
      phone:
        type: string
      vcard:
        type: string
    required:
    - name
    - phone
    - vcard
    type: object
  SendLinkReq:
    properties:
      description:
        type: string
      phone:
        type: string
      title:
        type: string
      url:
        type: string
    required:
    - phone
    - url
    type: object
  SendListReq:
    properties:
      body:
        type: string
      buttonText:
        type: string
      customId:
        type: string
      footer:
        type: string
      phone:
        type: string
      replyTo:
        $ref: '#/definitions/ReplyContext'
      sections:
        items:
          $ref: '#/definitions/ListSection'
        minItems: 1
        type: array
      title:
        type: string
    required:
    - body
    - buttonText
    - phone
    - sections
    - title
    type: object
  SendLocationReq:
    properties:
      address:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
      phone:
        type: string
    required:
    - latitude
    - longitude
    - phone
    type: object
  SendMediaReq:
    properties:
      base64:
        type: string
      caption:
        type: string
      customId:
        type: string
      fileName:
        type: string
      mimeType:
        type: string
      phone:
        type: string
      replyTo:
        $ref: '#/definitions/ReplyContext'
      url:
        type: string
    required:
    - mimeType
    - phone
    type: object
  SendPollReq:
    properties:
      name:
        type: string
      options:
        items:
          type: string
        minItems: 2
        type: array
      phone:
        type: string
      selectableCount:
        type: integer
    required:
    - name
    - options
    - phone
    type: object
  SendStickerReq:
    properties:
      base64:
        type: string
      mimeType:
        type: string
      phone:
        type: string
    required:
    - base64
    - mimeType
    - phone
    type: object
  SendTextReq:
    properties:
      body:
        type: string
      customId:
        type: string
      phone:
        type: string
      replyTo:
        $ref: '#/definitions/ReplyContext'
    required:
    - body
    - phone
    type: object
  SessionCreateReq:
    properties:
      apiKey:
        type: string
      name:
        type: string
      proxy:
        $ref: '#/definitions/SessionProxy'
      settings:
        $ref: '#/definitions/SessionSettings'
      webhook:
        $ref: '#/definitions/WebhookCreateInline'
    required:
    - name
    type: object
  SessionCreatedResp:
    properties:
      apiKey:
        type: string
      connected:
        type: integer
      createdAt:
        type: string
      id:
        type: string
      jid:
        type: string
      name:
        type: string
      proxy:
        $ref: '#/definitions/SessionProxy'
      settings:
        $ref: '#/definitions/SessionSettings'
      status:
        type: string
      updatedAt:
        type: string
      webhook:
        $ref: '#/definitions/WebhookResp'
    type: object
  SessionProxy:
    properties:
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      protocol:
        type: string
      username:
        type: string
    type: object
  SessionResp:
    properties:
      connected:
        type: integer
      createdAt:
        type: string
      id:
        type: string
      jid:
        type: string
      name:
        type: string
      proxy:
        $ref: '#/definitions/SessionProxy'
      settings:
        $ref: '#/definitions/SessionSettings'
      status:
        type: string
      updatedAt:
        type: string
    type: object
  SessionSettings:
    properties:
      alwaysOnline:
        type: boolean
      ignoreGroups:
        type: boolean
      ignoreStatus:
        type: boolean
      msgRejectCall:
        type: string
      readMessages:
        type: boolean
      rejectCall:
        type: boolean
    type: object
  SessionStatusResp:
    properties:
      connected:
        type: boolean
      id:
        type: string
      jid:
        type: string
      loggedIn:
        type: boolean
      name:
        type: string
      status:
        type: string
    type: object
  SessionUpdateReq:
    properties:
      name:
        type: string
      proxy:
        $ref: '#/definitions/SessionProxy'
      settings:
        $ref: '#/definitions/SessionSettings'
    type: object
  SetPresenceReq:
    properties:
      phone:
        type: string
      state:
        type: string
    required:
    - phone
    - state
    type: object
  SetPrivacyReq:
    properties:
      setting:
        type: string
      value:
        type: string
    required:
    - setting
    - value
    type: object
  SetProfilePictureReq:
    properties:
      image:
        type: string
    required:
    - image
    type: object
  SetStatusMessageReq:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  SubscribePresenceReq:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  UpdateWebhookReq:
    properties:
      enabled:
        type: boolean
      events:
        items:
          type: string
        type: array
      natsEnabled:
        type: boolean
      secret:
        type: string
      url:
        type: string
    type: object
  UserInfoResp:
    properties:
      devices:
        items:
          type: string
        type: array
      jid:
        type: string
      picture:
        type: string
      status:
        type: string
    type: object
  WebhookCreateInline:
    properties:
      events:
        items:
          type: string
        type: array
      url:
        type: string
    type: object
  WebhookResp:
    properties:
      createdAt:
        type: string
      enabled:
        type: boolean
      events:
        items:
          type: string
        type: array
      id:
        type: string
      natsEnabled:
        type: boolean
      secret:
        type: string
      sessionId:
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
info:
  contact:
    name: wzap Support
    url: https://github.com/felipyfgs/wzap
  description: WhatsApp Multi-Session API powered by whatsmeow
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: wzap API
  version: "1.0"
paths:
  /chat/archive:
    post:
      consumes:
      - application/json
      description: Archives a chat identified by JID, moving it out of the main chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Archive a chat
      tags:
      - Chat
  /chat/delete:
    post:
      consumes:
      - application/json
      description: Permanently deletes a chat (including media)
      parameters:
      - description: Chat JID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Delete a chat
      tags:
      - Chat
  /chat/mute:
    post:
      consumes:
      - application/json
      description: Mutes notifications for a chat identified by JID
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Mute a chat
      tags:
      - Chat
  /chat/pin:
    post:
      consumes:
      - application/json
      description: Pins a chat to the top of the chat list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Pin a chat
      tags:
      - Chat
  /chat/read:
    post:
      consumes:
      - application/json
      description: Marks specific messages in a chat as read
      parameters:
      - description: Chat JID + message IDs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatMarkReadReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Mark chat as read
      tags:
      - Chat
  /chat/unarchive:
    post:
      consumes:
      - application/json
      description: Removes a chat from the archived list
      parameters:
      - description: Chat JID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Unarchive a chat
      tags:
      - Chat
  /chat/unmute:
    post:
      consumes:
      - application/json
      description: Removes mute from a chat
      parameters:
      - description: Chat JID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Unmute a chat
      tags:
      - Chat
  /chat/unpin:
    post:
      consumes:
      - application/json
      description: Removes a chat from the pinned position at the top of the chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Unpin a chat
      tags:
      - Chat
  /community/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp Community (a group of groups) with a name
        and optional description
      parameters:
      - description: Community payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateCommunityReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Create a community
      tags:
      - Community
  /community/participant/add:
    post:
      consumes:
      - application/json
      description: Adds one or more subgroups (by JID) as participants to an existing
        community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Add subgroup to community
      tags:
      - Community
  /community/participant/remove:
    post:
      consumes:
      - application/json
      description: Removes one or more subgroups (by JID) from an existing community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Remove subgroup from community
      tags:
      - Community
  /contacts:
    get:
      description: Returns all contacts from the WhatsApp session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: List contacts
      tags:
      - Contacts
  /contacts/avatar:
    post:
      consumes:
      - application/json
      description: Fetches the profile picture URL and picture ID for the given WhatsApp
        JID
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GetAvatarReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/GetAvatarResp'
              type: object
      security:
      - Authorization: []
      summary: Get contact avatar
      tags:
      - Contacts
  /contacts/block:
    post:
      consumes:
      - application/json
      description: Blocks a WhatsApp contact by JID, preventing them from sending
        messages
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Block a contact
      tags:
      - Contacts
  /contacts/blocklist:
    get:
      description: Returns the full list of JIDs currently blocked by the session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Get blocked contacts list
      tags:
      - Contacts
  /contacts/check:
    post:
      consumes:
      - application/json
      description: Checks if phone numbers are registered on WhatsApp
      parameters:
      - description: Phone numbers
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CheckContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - Authorization: []
      summary: Check contacts on WhatsApp
      tags:
      - Contacts
  /contacts/info:
    post:
      consumes:
      - application/json
      description: Fetches detailed user info (status, profile picture, devices) for
        one or more WhatsApp JIDs
      parameters:
      - description: JIDs payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GetUserInfoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/UserInfoResp'
                  type: array
              type: object
      security:
      - Authorization: []
      summary: Get user info for JIDs
      tags:
      - Contacts
  /contacts/presence:
    post:
      consumes:
      - application/json
      description: Subscribes to presence updates for a contact (online/offline/typing)
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SubscribePresenceReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
