definitions:
  APIError:
    properties:
      Error:
        type: string
      Message:
        type: string
      Success:
        type: boolean
    type: object
  APIResponse:
    properties:
      Data: {}
      Message:
        type: string
      Success:
        type: boolean
    type: object
  BlockContactReq:
    properties:
      Phone:
        type: string
    required:
    - Phone
    type: object
  ChatActionReq:
    properties:
      Jid:
        type: string
    required:
    - Jid
    type: object
  CheckContactReq:
    properties:
      Phones:
        items:
          type: string
        type: array
    required:
    - Phones
    type: object
  CommunityParticipantReq:
    properties:
      CommunityJid:
        type: string
      Participants:
        items:
          type: string
        type: array
    required:
    - CommunityJid
    - Participants
    type: object
  ConnectResp:
    properties:
      Status:
        type: string
    type: object
  CreateCommunityReq:
    properties:
      Description:
        type: string
      Name:
        type: string
    required:
    - Name
    type: object
  CreateGroupReq:
    properties:
      Name:
        example: My Awesome Group
        type: string
      Participants:
        example:
        - "5511999999999"
        - "5511888888888"
        items:
          type: string
        type: array
    type: object
  CreateNewsletterReq:
    properties:
      Description:
        type: string
      Name:
        type: string
      Picture:
        type: string
    required:
    - Name
    type: object
  CreateWebhookReq:
    properties:
      Events:
        items:
          type: string
        type: array
      NatsEnabled:
        type: boolean
      Secret:
        type: string
      URL:
        type: string
    required:
    - Events
    - URL
    type: object
  DeleteMessageReq:
    properties:
      Mid:
        type: string
      Phone:
        type: string
    required:
    - Mid
    - Phone
    type: object
  EditLabelReq:
    properties:
      Color:
        type: integer
      Deleted:
        type: boolean
      LabelId:
        type: string
      Name:
        type: string
    required:
    - LabelId
    type: object
  EditMessageReq:
    properties:
      Body:
        type: string
      Mid:
        type: string
      Phone:
        type: string
    required:
    - Body
    - Mid
    - Phone
    type: object
  GetAvatarReq:
    properties:
      Phone:
        type: string
    required:
    - Phone
    type: object
  GetAvatarResp:
    properties:
      Id:
        type: string
      URL:
        type: string
    type: object
  GetUserInfoReq:
    properties:
      Phones:
        items:
          type: string
        type: array
    required:
    - Phones
    type: object
  GroupInviteLinkResp:
    properties:
      Link:
        type: string
    type: object
  GroupJIDReq:
    properties:
      GroupJid:
        type: string
    required:
    - GroupJid
    type: object
  GroupJoinReq:
    properties:
      InviteCode:
        type: string
    required:
    - InviteCode
    type: object
  GroupParticipantReq:
    properties:
      Action:
        example: add
        type: string
      GroupJid:
        type: string
      Participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - Action
    - GroupJid
    - Participants
    type: object
  GroupPhotoReq:
    properties:
      GroupJid:
        type: string
      Image:
        type: string
    required:
    - GroupJid
    - Image
    type: object
  GroupRequestActionReq:
    properties:
      Action:
        example: approve
        type: string
      GroupJid:
        type: string
      Participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - Action
    - GroupJid
    - Participants
    type: object
  GroupSettingReq:
    properties:
      Enabled:
        type: boolean
      GroupJid:
        type: string
    required:
    - GroupJid
    type: object
  GroupTextReq:
    properties:
      GroupJid:
        type: string
      Text:
        type: string
    required:
    - GroupJid
    - Text
    type: object
  LabelChatReq:
    properties:
      Jid:
        type: string
      LabelId:
        type: string
    required:
    - Jid
    - LabelId
    type: object
  LabelMessageReq:
    properties:
      Jid:
        type: string
      LabelId:
        type: string
      Mid:
        type: string
    required:
    - Jid
    - LabelId
    - Mid
    type: object
  MarkReadReq:
    properties:
      Mid:
        type: string
      Phone:
        type: string
    required:
    - Mid
    - Phone
    type: object
  MidResp:
    properties:
      Mid:
        type: string
    type: object
  NewsletterMessageReq:
    properties:
      BeforeId:
        type: integer
      Count:
        type: integer
      NewsletterJid:
        type: string
    required:
    - NewsletterJid
    type: object
  NewsletterSubscribeReq:
    properties:
      NewsletterJid:
        type: string
    required:
    - NewsletterJid
    type: object
  PictureIDResp:
    properties:
      PictureId:
        type: string
    type: object
  QRResp:
    properties:
      Image:
        type: string
      QRCode:
        type: string
    type: object
  ReactMessageReq:
    properties:
      Mid:
        type: string
      Phone:
        type: string
      Reaction:
        type: string
    required:
    - Mid
    - Phone
    - Reaction
    type: object
  SendContactReq:
    properties:
      Name:
        type: string
      Phone:
        type: string
      Vcard:
        type: string
    required:
    - Name
    - Phone
    - Vcard
    type: object
  SendLinkReq:
    properties:
      Description:
        type: string
      Phone:
        type: string
      Title:
        type: string
      URL:
        type: string
    required:
    - Phone
    - URL
    type: object
  SendLocationReq:
    properties:
      Address:
        type: string
      Latitude:
        type: number
      Longitude:
        type: number
      Name:
        type: string
      Phone:
        type: string
    required:
    - Latitude
    - Longitude
    - Phone
    type: object
  SendMediaReq:
    properties:
      Base64:
        type: string
      Caption:
        type: string
      FileName:
        type: string
      MimeType:
        type: string
      Phone:
        type: string
    required:
    - MimeType
    - Phone
    type: object
  SendPollReq:
    properties:
      Name:
        type: string
      Options:
        items:
          type: string
        minItems: 2
        type: array
      Phone:
        type: string
      SelectableCount:
        type: integer
    required:
    - Name
    - Options
    - Phone
    type: object
  SendStickerReq:
    properties:
      Base64:
        type: string
      MimeType:
        type: string
      Phone:
        type: string
    required:
    - Base64
    - MimeType
    - Phone
    type: object
  SendTextReq:
    properties:
      Body:
        type: string
      Phone:
        type: string
    required:
    - Body
    - Phone
    type: object
  SessionCreateReq:
    properties:
      ApiKey:
        type: string
      Name:
        type: string
      Proxy:
        $ref: '#/definitions/SessionProxy'
      Settings:
        $ref: '#/definitions/SessionSettings'
      Webhook:
        $ref: '#/definitions/WebhookCreateInline'
    required:
    - Name
    type: object
  SessionCreatedResp:
    properties:
      ApiKey:
        type: string
      Connected:
        type: integer
      CreatedAt:
        type: string
      Id:
        type: string
      Jid:
        type: string
      Name:
        type: string
      Proxy:
        $ref: '#/definitions/SessionProxy'
      Settings:
        $ref: '#/definitions/SessionSettings'
      Status:
        type: string
      UpdatedAt:
        type: string
      Webhook:
        $ref: '#/definitions/WebhookResp'
    type: object
  SessionProxy:
    properties:
      Host:
        type: string
      Password:
        type: string
      Port:
        type: integer
      Protocol:
        type: string
      Username:
        type: string
    type: object
  SessionResp:
    properties:
      Connected:
        type: integer
      CreatedAt:
        type: string
      Id:
        type: string
      Jid:
        type: string
      Name:
        type: string
      Proxy:
        $ref: '#/definitions/SessionProxy'
      Settings:
        $ref: '#/definitions/SessionSettings'
      Status:
        type: string
      UpdatedAt:
        type: string
    type: object
  SessionSettings:
    properties:
      AlwaysOnline:
        type: boolean
      IgnoreGroups:
        type: boolean
      IgnoreStatus:
        type: boolean
      MsgRejectCall:
        type: string
      ReadMessages:
        type: boolean
      RejectCall:
        type: boolean
    type: object
  SetPresenceReq:
    properties:
      Phone:
        type: string
      State:
        type: string
    required:
    - Phone
    - State
    type: object
  SetProfilePictureReq:
    properties:
      Image:
        type: string
    required:
    - Image
    type: object
  UserInfoResp:
    properties:
      Devices:
        items:
          type: string
        type: array
      Jid:
        type: string
      Picture:
        type: string
      Status:
        type: string
    type: object
  WebhookCreateInline:
    properties:
      Events:
        items:
          type: string
        type: array
      URL:
        type: string
    type: object
  WebhookResp:
    properties:
      CreatedAt:
        type: string
      Enabled:
        type: boolean
      Events:
        items:
          type: string
        type: array
      Id:
        type: string
      NatsEnabled:
        type: boolean
      Secret:
        type: string
      SessionId:
        type: string
      URL:
        type: string
      UpdatedAt:
        type: string
    type: object
info:
  contact:
    name: wzap Support
    url: https://github.com/felipyfgs/wzap
  description: WhatsApp Multi-Session API powered by whatsmeow
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: wzap API
  version: "1.0"
paths:
  /chat/archive:
    post:
      consumes:
      - application/json
      description: Archives a chat identified by JID, moving it out of the main chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Archive a chat
      tags:
      - Chat
  /chat/mute:
    post:
      consumes:
      - application/json
      description: Mutes notifications for a chat identified by JID
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Mute a chat
      tags:
      - Chat
  /chat/pin:
    post:
      consumes:
      - application/json
      description: Pins a chat to the top of the chat list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Pin a chat
      tags:
      - Chat
  /chat/unpin:
    post:
      consumes:
      - application/json
      description: Removes a chat from the pinned position at the top of the chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Unpin a chat
      tags:
      - Chat
  /community/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp Community (a group of groups) with a name
        and optional description
      parameters:
      - description: Community payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateCommunityReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Create a community
      tags:
      - Community
  /community/participant/add:
    post:
      consumes:
      - application/json
      description: Adds one or more subgroups (by JID) as participants to an existing
        community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Add subgroup to community
      tags:
      - Community
  /community/participant/remove:
    post:
      consumes:
      - application/json
      description: Removes one or more subgroups (by JID) from an existing community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Remove subgroup from community
      tags:
      - Community
  /contacts:
    get:
      description: Returns all contacts from the WhatsApp session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: List contacts
      tags:
      - Contacts
  /contacts/avatar:
    post:
      consumes:
      - application/json
      description: Fetches the profile picture URL and picture ID for the given WhatsApp
        JID
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GetAvatarReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/GetAvatarResp'
              type: object
      security:
      - ApiKey: []
      summary: Get contact avatar
      tags:
      - Contacts
  /contacts/block:
    post:
      consumes:
      - application/json
      description: Blocks a WhatsApp contact by JID, preventing them from sending
        messages
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Block a contact
      tags:
      - Contacts
  /contacts/blocklist:
    get:
      description: Returns the full list of JIDs currently blocked by the session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Get blocked contacts list
      tags:
      - Contacts
  /contacts/check:
    post:
      consumes:
      - application/json
      description: Checks if phone numbers are registered on WhatsApp
      parameters:
      - description: Phone numbers
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CheckContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Check contacts on WhatsApp
      tags:
      - Contacts
  /contacts/info:
    post:
      consumes:
      - application/json
      description: Fetches detailed user info (status, profile picture, devices) for
        one or more WhatsApp JIDs
      parameters:
      - description: JIDs payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/GetUserInfoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/UserInfoResp'
                  type: array
              type: object
      security:
      - ApiKey: []
      summary: Get user info for JIDs
      tags:
      - Contacts
  /contacts/privacy:
    get:
      description: Retrieves the current session's WhatsApp privacy settings (last-seen,
        profile photo, status visibility)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Get privacy settings
      tags:
      - Contacts
  /contacts/profile-picture:
    post:
      consumes:
      - application/json
      description: Updates the session account's WhatsApp profile picture with a base64-encoded
        image
      parameters:
      - description: Base64 image payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SetProfilePictureReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/PictureIDResp'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIError'
      security:
      - ApiKey: []
      summary: Set profile picture
      tags:
      - Contacts
  /contacts/unblock:
    post:
      consumes:
      - application/json
      description: Unblocks a previously blocked WhatsApp contact by JID
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Unblock a contact
      tags:
      - Contacts
  /groups:
    get:
      description: Returns all WhatsApp groups the session is part of
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: List joined groups
      tags:
      - Groups
  /groups/announce:
    post:
      consumes:
      - application/json
      description: Sets whether only admins can send messages in the group
      parameters:
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Set group announce mode
      tags:
      - Groups
  /groups/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp group with the given participants
      parameters:
      - description: Group properties
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateGroupReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Create a new group
      tags:
      - Groups
  /groups/description:
    post:
      consumes:
      - application/json
      description: Updates the description of the specified WhatsApp group
      parameters:
      - description: New description
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Update group description
      tags:
      - Groups
  /groups/info:
    post:
      consumes:
      - application/json
      description: Get detailed information about a group by JID
      parameters:
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupJIDReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Get group info
      tags:
      - Groups
  /groups/invite-info:
    post:
      consumes:
      - application/json
      description: Previews a group's info using an invite code without joining
      parameters:
      - description: Invite Code Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupJoinReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Get group info from invite link
      tags:
      - Groups
  /groups/invite-link:
    post:
      description: Gets the invite link for a WhatsApp group, optionally resetting
        it
      parameters:
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupJIDReq'
      - description: Reset the invite link
        in: query
        name: reset
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/GroupInviteLinkResp'
              type: object
      security:
      - ApiKey: []
      summary: Get group invite link
      tags:
      - Groups
  /groups/join:
    post:
      consumes:
      - application/json
      description: Joins a group using an invite code
      parameters:
      - description: Invite Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupJoinReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Join group via link
      tags:
      - Groups
  /groups/join-approval:
    post:
      consumes:
      - application/json
      description: Activates or deactivates the admin approval system for new members
      parameters:
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
      security:
      - ApiKey: []
      summary: Set group join approval mode
      tags:
      - Groups
  /groups/leave:
    post:
      description: Leaves a specified WhatsApp group
      parameters:
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/GroupJIDReq'
