definitions:
  model.APIError:
    properties:
      details:
        type: string
      error:
        type: string
      success:
        type: boolean
    type: object
  model.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  model.BlockContactReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  model.ChatActionReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  model.CheckContactReq:
    properties:
      phones:
        items:
          type: string
        type: array
    required:
    - phones
    type: object
  model.CommunityParticipantReq:
    properties:
      jid:
        type: string
      participants:
        items:
          type: string
        type: array
    required:
    - jid
    - participants
    type: object
  model.CreateCommunityReq:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  model.CreateGroupReq:
    properties:
      name:
        example: My Awesome Group
        type: string
      participants:
        description: list of phone numbers
        example:
        - "5511999999999"
        - "5511888888888"
        items:
          type: string
        type: array
    type: object
  model.CreateNewsletterReq:
    properties:
      description:
        type: string
      name:
        type: string
      picture:
        description: base64
        type: string
    required:
    - name
    type: object
  model.CreateWebhookReq:
    properties:
      events:
        items:
          type: string
        type: array
      secret:
        type: string
      url:
        type: string
    required:
    - events
    - url
    type: object
  model.DeleteMessageReq:
    properties:
      message_id:
        type: string
      to:
        type: string
    required:
    - message_id
    - to
    type: object
  model.EditLabelReq:
    properties:
      color:
        type: integer
      deleted:
        type: boolean
      labelId:
        type: string
      name:
        type: string
    required:
    - labelId
    type: object
  model.EditMessageReq:
    properties:
      message_id:
        type: string
      text:
        type: string
      to:
        type: string
    required:
    - message_id
    - text
    - to
    type: object
  model.GetAvatarReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  model.GetAvatarResp:
    properties:
      id:
        type: string
      url:
        type: string
    type: object
  model.GetUserInfoReq:
    properties:
      jids:
        items:
          type: string
        type: array
    required:
    - jids
    type: object
  model.GroupInviteLinkResp:
    properties:
      link:
        type: string
    type: object
  model.GroupJIDReq:
    properties:
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  model.GroupJoinReq:
    properties:
      invite_code:
        type: string
    required:
    - invite_code
    type: object
  model.GroupParticipantReq:
    properties:
      action:
        description: add, remove, promote, demote
        example: add
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  model.GroupPhotoReq:
    properties:
      groupJid:
        type: string
      photo_base64:
        description: Base64 encoded image
        type: string
    required:
    - groupJid
    - photo_base64
    type: object
  model.GroupRequestActionReq:
    properties:
      action:
        description: approve, reject
        example: approve
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  model.GroupSettingReq:
    properties:
      enabled:
        type: boolean
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  model.GroupTextReq:
    properties:
      groupJid:
        type: string
      text:
        type: string
    required:
    - groupJid
    - text
    type: object
  model.LabelChatReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
    required:
    - jid
    - labelId
    type: object
  model.LabelMessageReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
      messageId:
        type: string
    required:
    - jid
    - labelId
    - messageId
    type: object
  model.MarkReadReq:
    properties:
      message_id:
        type: string
      to:
        type: string
    required:
    - message_id
    - to
    type: object
  model.NewsletterMessageReq:
    properties:
      before_id:
        type: integer
      count:
        type: integer
      jid:
        type: string
    required:
    - jid
    type: object
  model.ReactMessageReq:
    properties:
      message_id:
        type: string
      reaction:
        description: emoji or empty to remove
        type: string
      to:
        type: string
    required:
    - message_id
    - reaction
    - to
    type: object
  model.SendContactReq:
    properties:
      name:
        type: string
      to:
        type: string
      vcard:
        type: string
    required:
    - name
    - to
    - vcard
    type: object
  model.SendLinkReq:
    properties:
      description:
        type: string
      title:
        type: string
      to:
        type: string
      url:
        type: string
    required:
    - to
    - url
    type: object
  model.SendLocationReq:
    properties:
      address:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      to:
        type: string
    required:
    - lat
    - lng
    - to
    type: object
  model.SendMediaReq:
    properties:
      base64:
        description: For base64 upload
        type: string
      caption:
        type: string
      filename:
        description: For documents
        type: string
      mime_type:
        type: string
      to:
        type: string
    required:
    - mime_type
    - to
    type: object
  model.SendPollReq:
    properties:
      name:
        type: string
      options:
        items:
          type: string
        minItems: 2
        type: array
      selectable_count:
        type: integer
      to:
        type: string
    required:
    - name
    - options
    - to
    type: object
  model.SendStickerReq:
    properties:
      base64:
        type: string
      mime_type:
        type: string
      to:
        type: string
    required:
    - base64
    - mime_type
    - to
    type: object
  model.SendTextReq:
    properties:
      text:
        type: string
      to:
        description: Phone number or group JID
        type: string
    required:
    - text
    - to
    type: object
  model.SessionCreateReq:
    properties:
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
    required:
    - id
    type: object
  model.SetPresenceReq:
    properties:
      presence:
        description: typing, recording, paused
        type: string
      to:
        type: string
    required:
    - presence
    - to
    type: object
  model.SetProfilePictureReq:
    properties:
      base64:
        type: string
    required:
    - base64
    type: object
  model.UserInfoResp:
    properties:
      devices:
        items:
          type: string
        type: array
      jid:
        type: string
      picture:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    name: wzap Support
    url: https://github.com/galvaofelipe421-wq/fiozap
  description: WhatsApp Multi-Session API powered by whatsmeow
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/galvaofelipe421-wq/fiozap
  title: wzap API
  version: "1.0"
paths:
  /chat/archive:
    post:
      consumes:
      - application/json
      description: Archives a chat identified by JID, moving it out of the main chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Archive a chat
      tags:
      - Chat
  /chat/mute:
    post:
      consumes:
      - application/json
      description: Mutes notifications for a chat identified by JID
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Mute a chat
      tags:
      - Chat
  /chat/pin:
    post:
      consumes:
      - application/json
      description: Pins a chat to the top of the chat list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Pin a chat
      tags:
      - Chat
  /chat/unpin:
    post:
      consumes:
      - application/json
      description: Removes a chat from the pinned position at the top of the chat
        list
      parameters:
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Unpin a chat
      tags:
      - Chat
  /community/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp Community (a group of groups) with a name
        and optional description
      parameters:
      - description: Community payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateCommunityReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a community
      tags:
      - Community
  /community/participant/add:
    post:
      consumes:
      - application/json
      description: Adds one or more subgroups (by JID) as participants to an existing
        community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Add subgroup to community
      tags:
      - Community
  /community/participant/remove:
    post:
      consumes:
      - application/json
      description: Removes one or more subgroups (by JID) from an existing community
      parameters:
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Remove subgroup from community
      tags:
      - Community
  /contacts:
    get:
      description: Returns all contacts from the WhatsApp session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: List contacts
      tags:
      - Contacts
  /contacts/avatar:
    post:
      consumes:
      - application/json
      description: Fetches the profile picture URL and picture ID for the given WhatsApp
        JID
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.GetAvatarReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.GetAvatarResp'
              type: object
      security:
      - BearerAuth: []
      summary: Get contact avatar
      tags:
      - Contacts
  /contacts/block:
    post:
      consumes:
      - application/json
      description: Blocks a WhatsApp contact by JID, preventing them from sending
        messages
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Block a contact
      tags:
      - Contacts
  /contacts/blocklist:
    get:
      description: Returns the full list of JIDs currently blocked by the session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get blocked contacts list
      tags:
      - Contacts
  /contacts/check:
    post:
      consumes:
      - application/json
      description: Checks if phone numbers are registered on WhatsApp
      parameters:
      - description: Phone numbers
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CheckContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Check contacts on WhatsApp
      tags:
      - Contacts
  /contacts/info:
    post:
      consumes:
      - application/json
      description: Fetches detailed user info (status, profile picture, devices) for
        one or more WhatsApp JIDs
      parameters:
      - description: JIDs payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.GetUserInfoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.UserInfoResp'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Get user info for JIDs
      tags:
      - Contacts
  /contacts/privacy:
    get:
      description: Retrieves the current session's WhatsApp privacy settings (last-seen,
        profile photo, status visibility)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get privacy settings
      tags:
      - Contacts
  /contacts/profile-picture:
    post:
      consumes:
      - application/json
      description: Updates the session account's WhatsApp profile picture with a base64-encoded
        image
      parameters:
      - description: Base64 image payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.SetProfilePictureReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set profile picture
      tags:
      - Contacts
  /contacts/unblock:
    post:
      consumes:
      - application/json
      description: Unblocks a previously blocked WhatsApp contact by JID
      parameters:
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Unblock a contact
      tags:
      - Contacts
  /groups:
    get:
      description: Returns all WhatsApp groups the session is part of
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: List joined groups
      tags:
      - Groups
  /groups/announce:
    post:
      consumes:
      - application/json
      description: Sets whether only admins can send messages in the group
      parameters:
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group announce mode
      tags:
      - Groups
  /groups/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp group with the given participants
      parameters:
      - description: Group properties
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateGroupReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new group
      tags:
      - Groups
  /groups/description:
    post:
      consumes:
      - application/json
      description: Updates the description of the specified WhatsApp group
      parameters:
      - description: New description
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group description
      tags:
      - Groups
  /groups/info:
    post:
      description: Get detailed information about a group by JID
      parameters:
      - description: Group JID
        in: query
        name: jid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get group info
      tags:
      - Groups
  /groups/invite-info:
    post:
      description: Previews a group's info using an invite code without joining
      parameters:
      - description: Invite Code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Get group info from invite link
      tags:
      - Groups
  /groups/invite-link:
    post:
      description: Gets the invite link for a WhatsApp group, optionally resetting
        it
      parameters:
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupJIDReq'
      - description: Reset the invite link
        in: query
        name: reset
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.GroupInviteLinkResp'
              type: object
      security:
      - BearerAuth: []
      summary: Get group invite link
      tags:
      - Groups
  /groups/join:
    post:
      consumes:
      - application/json
      description: Joins a group using an invite code
      parameters:
      - description: Invite Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupJoinReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Join group via link
      tags:
      - Groups
  /groups/join-approval:
    post:
      consumes:
      - application/json
      description: Activates or deactivates the admin approval system for new members
      parameters:
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group join approval mode
      tags:
      - Groups
  /groups/leave:
    post:
      description: Leaves a specified WhatsApp group
      parameters:
      - description: Target Group JID Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupJIDReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Leave group
      tags:
      - Groups
  /groups/locked:
    post:
      consumes:
      - application/json
      description: Sets whether only admins can edit group info
      parameters:
      - description: Enabled state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupSettingReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Set group locked mode
      tags:
      - Groups
  /groups/name:
    post:
      consumes:
      - application/json
      description: Updates the name of the specified WhatsApp group
      parameters:
      - description: New name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupTextReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group name
      tags:
      - Groups
  /groups/participants:
    post:
      consumes:
      - application/json
      description: Add, remove, promote or demote participants in a group
      parameters:
      - description: Participants and action
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      security:
      - BearerAuth: []
      summary: Update group participants
      tags:
      - Groups
  /groups/photo:
    post:
      consumes:
      - application/json
      description: Updates the profile picture of the specified WhatsApp group
      parameters:
      - description: Base64 encoded photo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GroupPhotoReq'
      produces:
