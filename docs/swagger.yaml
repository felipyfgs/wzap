info:
  contact:
    name: wzap Support
    url: https://github.com/felipyfgs/wzap
  description: WhatsApp Multi-Session API powered by whatsmeow
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: wzap API
  version: "1.0"
paths:
  /chatwoot/webhook/{sessionId}:
    post:
      consumes:
      - application/json
      description: Handles incoming Chatwoot webhook events (agent replies, message
        updates, conversation status changes)
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: HMAC-SHA256 signature
        in: header
        name: X-Chatwoot-Hmac-Sha256
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.APIError'
      summary: Receive webhook events from Chatwoot
      tags:
      - Chatwoot
  /health:
    get:
      description: Returns the health status of the API and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Health check
      tags:
      - Health
  /metrics:
    get:
      description: Exposes Prometheus metrics for monitoring wzap instance
      produces:
      - text/plain
      responses:
        "200":
          description: Prometheus text format metrics
          schema:
            type: string
      summary: Prometheus metrics endpoint
      tags:
      - Metrics
  /sessions:
    get:
      description: Returns all sessions. Token is never included in list responses.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/dto.SessionResp'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.APIError'
      security:
      - Authorization: []
      summary: List sessions (Admin Only)
      tags:
      - Sessions
    post:
      consumes:
      - application/json
      description: Creates a new session with an auto-generated or custom token. Returns
        the full session object including the token.
      parameters:
      - description: Session data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SessionCreateReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/dto.SessionCreatedResp'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.APIError'
      security:
      - Authorization: []
      summary: Create a new session (Admin Only)
      tags:
      - Sessions
  /sessions/{sessionId}:
    delete:
      description: Disconnects and permanently deletes the session and its device
        from the store
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.APIError'
      security:
      - Authorization: []
      summary: Delete session
      tags:
      - Sessions
    get:
      description: Returns the session identified by :sessionId (name or id). Token
        is not included.
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/dto.SessionResp'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.APIError'
      security:
      - Authorization: []
      summary: Get session
      tags:
      - Sessions
    put:
      consumes:
      - application/json
      description: Updates session fields (name, proxy, settings). Only provided fields
        are changed.
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Session update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SessionUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
