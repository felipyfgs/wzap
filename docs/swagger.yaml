      - Webhooks
    post:
      consumes:
      - application/json
      description: Registers a new webhook for the session
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Webhook data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateWebhookReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
