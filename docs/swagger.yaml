  /sessions:
    get:
      description: Returns all sessions. Token is never included in list responses.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/SessionResp'
                  type: array
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: List sessions (Admin Only)
      tags:
      - Sessions
    post:
      consumes:
      - application/json
      description: Creates a new session with an auto-generated or custom token. Returns
        the full session object including the token.
      parameters:
      - description: Session data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SessionCreateReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/SessionCreatedResp'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Create a new session (Admin Only)
      tags:
      - Sessions
  /sessions/{sessionId}:
    delete:
      description: Disconnects and permanently deletes the session and its device
        from the store
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Delete session
      tags:
      - Sessions
    get:
      description: Returns the session identified by :sessionId (name or id). Token
        is not included.
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/SessionResp'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Get session
      tags:
      - Sessions
    put:
      consumes:
      - application/json
      description: Updates session fields (name, proxy, settings). Only provided fields
        are changed.
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Session update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SessionUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/SessionResp'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Update session
      tags:
      - Sessions
  /sessions/{sessionId}/connect:
    post:
      description: Connects a WhatsApp session. Returns status CONNECTED, PAIRING
        (QR required), or CONNECTING.
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/APIResponse'
            - properties:
                Data:
                  $ref: '#/definitions/ConnectResp'
              type: object
        "409":
          description: QR pairing already pending
          schema:
            $ref: '#/definitions/APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Connect session
      tags:
      - Sessions
  /sessions/{sessionId}/disconnect:
