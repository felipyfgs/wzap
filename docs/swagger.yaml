      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIError'
      security:
      - Authorization: []
      summary: Disconnect session
